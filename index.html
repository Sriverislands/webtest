<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Webテスト対策トレーナー</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3949ab">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Webテスト">
<style>
:root{--bg:#f2f4f9;--card:#fff;--ink:#1e2633;--sub:#69758a;--acc:#3949ab;--accL:#e8eaf6;--ok:#2e9e5b;--okL:#e6f5ec;--ng:#d64545;--ngL:#fbeaea;--line:#dfe4ee}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7}
header{background:var(--acc);color:#fff;padding:12px 16px}
header h1{font-size:16px;margin:0;font-weight:700}
nav{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
nav button{flex:1;padding:11px 2px;border:none;background:none;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;font-family:inherit}
nav button.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
main{max-width:720px;margin:0 auto;padding:14px 12px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{font-size:14px;margin:0 0 10px;color:var(--acc)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;font-family:inherit}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;background:var(--acc);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn.sub{background:#fff;color:var(--acc);border:1.5px solid var(--acc)}
.btn.sm{width:auto;display:inline-block;padding:8px 18px;font-size:13px}
.muted{color:var(--sub);font-size:12.5px}
.row{display:flex;gap:10px;align-items:center}
.big{font-size:26px;font-weight:800}
.pbar{height:8px;background:var(--accL);border-radius:99px;overflow:hidden;margin:6px 0}
.pbar>div{height:100%;background:var(--acc);border-radius:99px}
.dcols{display:flex;gap:6px;align-items:flex-end;height:56px;margin-top:8px}
.dcol{flex:1;text-align:center}
.dbar{background:var(--acc);border-radius:4px 4px 0 0;margin:0 auto;width:70%}
.dlab{font-size:10px;color:var(--sub);margin-top:2px}
.qtext{font-size:15.5px;margin:10px 0;white-space:pre-wrap}
.passage{background:#f7f8fc;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13.5px;white-space:pre-wrap;margin-bottom:10px;max-height:300px;overflow-y:auto}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{text-align:left;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14.5px;cursor:pointer;font-family:inherit;line-height:1.5}
.choice.ok{background:var(--okL);border-color:var(--ok);font-weight:700}
.choice.ng{background:var(--ngL);border-color:var(--ng)}
.choice:disabled{opacity:.92;cursor:default}
.expl{background:var(--okL);border:1px solid var(--ok);border-radius:10px;padding:12px;margin-top:12px;font-size:13.5px;white-space:pre-wrap}
.expl.bad{background:var(--ngL);border-color:var(--ng)}
.timer{font-weight:800;font-variant-numeric:tabular-nums}
.timer.warn{color:var(--ng)}
table.dt{border-collapse:collapse;margin:8px 0;font-size:12.5px;width:100%}
table.dt th,table.dt td{border:1px solid #c6cede;padding:5px 7px;text-align:right}
table.dt th{background:var(--accL);text-align:center}
table.dt td:first-child{text-align:left}
.statrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.statrow:last-child{border-bottom:none}
.sbar{flex:1;height:8px;background:#edf0f7;border-radius:99px;overflow:hidden}
.sbar>div{height:100%;border-radius:99px}
.tag{display:inline-block;font-size:11px;background:var(--accL);color:var(--acc);border-radius:5px;padding:1px 7px;margin-right:6px}
textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;font-family:inherit}
input[type=number]{width:70px;padding:6px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit}
.mockitem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);gap:10px}
.mockitem:last-child{border-bottom:none}
.center{text-align:center}
</style>
</head>
<body>
<header><h1>Webテスト対策トレーナー</h1></header>
<nav id="nav"></nav>
<main id="main"></main>
<script>
"use strict";
/* ================= 問題データ ================= */
const BANK=[];
/* ---- SPI 非言語 ---- */
(function(){const T="spi",S="nv";BANK.push(
{t:T,s:S,c:"推論",q:"P、Q、R、Sの4人が徒競走をした。PはQより速く、SはRより速く、QはRより遅かった。確実に言えるのはどれか。",ch:["SはQより速い","PはSより速い","RはPより遅い","QはSより速い"],a:0,e:"条件を整理すると S＞R＞Q、P＞Q。SはRより速くRはQより速いので、S＞Qは確実。PとS・Rの関係は不明。"},
{t:T,s:S,c:"推論",q:"A〜Eの5人の身長について、AはBより高く、BはCより高く、DはAより高く、CはEより高い。確実に最も低いのは誰か。",ch:["B","C","E","この条件では決まらない"],a:2,e:"D＞A＞B＞C＞E と一列に並ぶので、最も低いのはE。"},
{t:T,s:S,c:"推論",q:"A「犯人はBだ」 B「私は犯人ではない」 C「犯人はAだ」。犯人は1人で、3人のうち嘘をついているのは1人だけである。犯人は誰か。",ch:["A","B","C","特定できない"],a:0,e:"犯人をAと仮定：Aの発言は嘘、B・Cは本当→嘘つき1人で成立。B犯人ならA本当・B嘘・C嘘で2人、C犯人ならA嘘・B本当・C嘘で2人となり矛盾。"},
{t:T,s:S,c:"推論",q:"X、Y、Zは営業・経理・総務のいずれか別々の部署に所属している。Xは経理ではなく、Zは総務である。Yの部署はどこか。",ch:["営業","経理","総務","特定できない"],a:1,e:"Zが総務なので、Xは営業か経理。Xは経理ではないから営業。残るYが経理。"},
{t:T,s:S,c:"推論",q:"マラソンで5人が走っている。Aはゴール直前で3位の人を追い抜いた。ゴール時のAの順位は何位か。",ch:["2位","3位","4位","5位"],a:1,e:"3位の人を抜くと、その人の順位に入れ替わるので3位。2位にはならない点に注意。"},
{t:T,s:S,c:"推論",q:"リンゴ2個はミカン3個と同じ重さで、ミカン6個はモモ2個と同じ重さである。リンゴ4個はモモ何個分の重さか。",ch:["1個","2個","3個","4個"],a:1,e:"ミカン3個＝モモ1個。リンゴ2個＝ミカン3個＝モモ1個なので、リンゴ4個＝モモ2個。"},
{t:T,s:S,c:"推論",q:"「サッカーが好きな人は野球も好きである」が正しいとき、確実に言えるのはどれか。",ch:["野球が好きでない人はサッカーも好きでない","野球が好きな人はサッカーも好き","サッカーが好きでない人は野球も好きでない","野球が好きな人はサッカーが好きでない"],a:0,e:"命題が正しいとき確実に言えるのは対偶。「サッカー好き→野球好き」の対偶は「野球が好きでない→サッカーが好きでない」。逆や裏は必ずしも成り立たない。"},
{t:T,s:S,c:"推論",q:"A、B、Cの所持金の合計は9500円である。AはBより1000円多く、CはBより500円少ない。Bの所持金はいくらか。",ch:["2500円","3000円","3500円","4000円"],a:1,e:"B＋(B＋1000)＋(B−500)＝9500 → 3B＋500＝9500 → B＝3000円。"},
{t:T,s:S,c:"推論",q:"6人が横一列に並んでいる。両端はAとF（Aが左端）。BはAの隣、EはFの隣で、CはDの左隣である。Dは左から何番目か。",ch:["2番目","3番目","4番目","5番目"],a:2,e:"A B ＿ ＿ E F が確定し、残るC・DはCがDの左なので A B C D E F。Dは左から4番目。"},
{t:T,s:S,c:"推論",q:"ある月の3日は水曜日である。この月の20日は何曜日か。",ch:["木曜日","金曜日","土曜日","日曜日"],a:2,e:"3日が水曜なら10日・17日も水曜。20日は17日の3日後なので土曜日。"},
{t:T,s:S,c:"割合・比",q:"ある会社では男性が全体の60%を占める。女性が140人のとき、社員は全部で何人か。",ch:["230人","280人","350人","400人"],a:2,e:"女性は全体の40%にあたる。140÷0.4＝350人。"},
{t:T,s:S,c:"割合・比",q:"昨年の売上は200万円だった。今年は昨年より15%増加した。今年の売上はいくらか。",ch:["215万円","220万円","230万円","240万円"],a:2,e:"200×1.15＝230万円。"},
{t:T,s:S,c:"割合・比",q:"濃度10%の食塩水300gに水を100g加えると、濃度は何%になるか。",ch:["6.5%","7.5%","8%","8.5%"],a:1,e:"食塩は300×0.1＝30gのまま。全体は400gになるので 30÷400＝7.5%。"},
{t:T,s:S,c:"割合・比",q:"A:B＝3:5、B:C＝10:7 のとき、A＋B＋C＝230 ならAはいくつか。",ch:["50","60","70","80"],a:1,e:"Bを10にそろえると A:B:C＝6:10:7。合計23が230にあたるので1あたり10。A＝60。"},
{t:T,s:S,c:"割合・比",q:"4人のテストの平均点は70点である。3人の点数が75点、68点、62点のとき、残り1人の点数は何点か。",ch:["70点","72点","75点","78点"],a:2,e:"合計は70×4＝280点。280−(75＋68＋62)＝280−205＝75点。"},
{t:T,s:S,c:"損益算",q:"原価800円の商品に25%の利益を見込んで定価をつけた。定価はいくらか。",ch:["900円","950円","1000円","1200円"],a:2,e:"800×1.25＝1000円。"},
{t:T,s:S,c:"損益算",q:"定価1500円の商品を2割引で売った。売価はいくらか。",ch:["1200円","1250円","1300円","1350円"],a:0,e:"1500×0.8＝1200円。"},
{t:T,s:S,c:"損益算",q:"原価1200円の商品に3割の利益を見込んで定価をつけ、その定価の1割引で売った。利益はいくらか。",ch:["156円","180円","204円","240円"],a:2,e:"定価＝1200×1.3＝1560円。売価＝1560×0.9＝1404円。利益＝1404−1200＝204円。"},
{t:T,s:S,c:"損益算",q:"ある商品を定価の20%引きで売っても、原価の12%の利益が出る。定価は原価の何%増しか。",ch:["30%","35%","40%","45%"],a:2,e:"定価をx、原価をcとすると 0.8x＝1.12c → x＝1.4c。よって40%増し。"},
{t:T,s:S,c:"損益算",q:"1個600円で仕入れた商品100個を、80個は定価900円で売り、残り20個は定価の半額で売った。全体の利益はいくらか。",ch:["15000円","18000円","21000円","24000円"],a:2,e:"売上＝900×80＋450×20＝72000＋9000＝81000円。仕入れ＝600×100＝60000円。利益＝21000円。"},
{t:T,s:S,c:"損益算",q:"消費税10%を含む支払額が1100円だった。税抜き価格はいくらか。",ch:["990円","1000円","1010円","1090円"],a:1,e:"1100÷1.1＝1000円。"},
{t:T,s:S,c:"速度算",q:"時速60kmの車で45分走ると、何km進むか。",ch:["40km","45km","48km","50km"],a:1,e:"45分＝0.75時間。60×0.75＝45km。"},
{t:T,s:S,c:"速度算",q:"12kmの道のりを時速4kmで歩くと、何時間かかるか。",ch:["2時間","2時間30分","3時間","3時間30分"],a:2,e:"12÷4＝3時間。"},
{t:T,s:S,c:"速度算",q:"行きは時速60km、帰りは同じ道を時速40kmで往復した。往復の平均時速はいくらか。",ch:["45km/h","48km/h","50km/h","52km/h"],a:1,e:"平均時速＝2×60×40÷(60＋40)＝4800÷100＝48km/h。単純平均の50にならない点に注意。"},
{t:T,s:S,c:"速度算",q:"16km離れた2地点から、AとBが向かい合って同時に出発した。Aは時速5km、Bは時速3kmで進む。2人が出会うのは出発から何時間後か。",ch:["1.5時間後","2時間後","2.5時間後","3時間後"],a:1,e:"2人合わせて1時間に8km近づく。16÷8＝2時間後。"},
{t:T,s:S,c:"速度算",q:"長さ200mの列車が時速72kmで走っている。長さ600mの鉄橋を渡り始めてから渡り終わるまで何秒かかるか。",ch:["30秒","35秒","40秒","45秒"],a:2,e:"時速72km＝秒速20m。渡り切る距離は橋600m＋列車200m＝800m。800÷20＝40秒。"},
{t:T,s:S,c:"場合の数",q:"5人の中から2人の代表を選ぶ選び方は何通りか。",ch:["10通り","15通り","20通り","25通り"],a:0,e:"組み合わせ 5C2＝(5×4)÷(2×1)＝10通り。"},
{t:T,s:S,c:"場合の数",q:"4人を一列に並べる並べ方は何通りか。",ch:["12通り","16通り","24通り","32通り"],a:2,e:"4!＝4×3×2×1＝24通り。"},
{t:T,s:S,c:"場合の数",q:"男子3人、女子2人の中から男子1人と女子1人を選ぶ選び方は何通りか。",ch:["5通り","6通り","8通り","10通り"],a:1,e:"3×2＝6通り。"},
{t:T,s:S,c:"場合の数",q:"0、1、2、3の4枚のカードから3枚を使って3桁の整数を作る。何通りできるか。",ch:["18通り","24通り","12通り","16通り"],a:0,e:"百の位は0以外の3通り、十の位は残り3通り、一の位は残り2通り。3×3×2＝18通り。"},
{t:T,s:S,c:"場合の数",q:"6人の中から委員長1人と副委員長1人を選ぶ選び方は何通りか。",ch:["15通り","20通り","30通り","36通り"],a:2,e:"役職の区別があるので順列。6×5＝30通り。"},
{t:T,s:S,c:"確率",q:"サイコロを2個同時に振ったとき、出た目の和が5になる確率はいくらか。",ch:["1/12","1/9","1/6","5/36"],a:1,e:"和が5になるのは(1,4)(2,3)(3,2)(4,1)の4通り。4/36＝1/9。"},
{t:T,s:S,c:"確率",q:"コインを3回投げたとき、表がちょうど2回出る確率はいくらか。",ch:["1/4","3/8","1/2","5/8"],a:1,e:"全体は2³＝8通り。表2回は3C2＝3通り。3/8。"},
{t:T,s:S,c:"確率",q:"赤玉3個、白玉2個が入った袋から同時に2個取り出すとき、2個とも赤である確率はいくらか。",ch:["1/5","3/10","2/5","1/2"],a:1,e:"3C2÷5C2＝3÷10＝3/10。"},
{t:T,s:S,c:"確率",q:"サイコロを1個振ったとき、偶数かつ4以上の目が出る確率はいくらか。",ch:["1/6","1/3","1/2","2/3"],a:1,e:"該当するのは4と6の2通り。2/6＝1/3。"},
{t:T,s:S,c:"確率",q:"10本中2本が当たりのくじを1本引くとき、はずれる確率はいくらか。",ch:["1/5","3/5","4/5","9/10"],a:2,e:"はずれは8本。8/10＝4/5。"},
{t:T,s:S,c:"集合",q:"40人のクラスで、犬が好きな人は25人、猫が好きな人は18人、両方好きな人は10人いる。どちらも好きでない人は何人か。",ch:["5人","7人","9人","12人"],a:1,e:"少なくとも一方が好きな人＝25＋18−10＝33人。40−33＝7人。"},
{t:T,s:S,c:"集合",q:"100人が試験を受け、英語の合格者は60人、数学の合格者は45人、両方の合格者は30人だった。英語だけ合格した人は何人か。",ch:["15人","25人","30人","35人"],a:2,e:"英語のみ＝60−30＝30人。"},
{t:T,s:S,c:"集合",q:"50人のうち、A新聞を読む人は32人、B新聞を読む人は25人、どちらも読まない人は8人いる。両方読む人は何人か。",ch:["10人","12人","15人","17人"],a:2,e:"少なくとも一方を読む人＝50−8＝42人。両方＝32＋25−42＝15人。"},
{t:T,s:S,c:"集合",q:"60人に旅行の希望を聞いたところ、温泉希望が40人、観光希望が35人、どちらも希望しない人が5人だった。両方希望した人は何人か。",ch:["15人","20人","25人","30人"],a:1,e:"少なくとも一方＝60−5＝55人。両方＝40＋35−55＝20人。"},
{t:T,s:S,c:"仕事算",q:"ある仕事をAは12日、Bは6日で終える。2人で一緒にすると何日で終わるか。",ch:["3日","4日","5日","6日"],a:1,e:"1日あたり 1/12＋1/6＝1/4。よって4日。"},
{t:T,s:S,c:"仕事算",q:"水槽を満水にするのに、給水管Aだけなら20分、Bだけなら30分かかる。両方同時に使うと何分かかるか。",ch:["10分","12分","15分","25分"],a:1,e:"1分あたり 1/20＋1/30＝5/60＝1/12。よって12分。"},
{t:T,s:S,c:"仕事算",q:"Aだけなら10日かかる仕事を、Aが4日行い、残りをBが9日で仕上げた。Bだけなら何日かかるか。",ch:["12日","13日","15日","18日"],a:2,e:"Aの4日で全体の4/10＝2/5が終わり、残り3/5をBが9日で行った。Bの1日あたりは(3/5)÷9＝1/15。よって15日。"},
{t:T,s:S,c:"仕事算",q:"同じ能力の3人で行うと4日かかる仕事がある。1人で行うと何日かかるか。",ch:["8日","10日","12日","16日"],a:2,e:"全体の仕事量＝3人×4日＝12人日。1人なら12日。"},
{t:T,s:S,c:"料金・支払い",q:"商品代金の1/3を頭金として支払い、残額の2/5を初回に支払った。残りの支払額は代金全体のどれだけにあたるか。",ch:["1/3","2/5","4/15","7/15"],a:1,e:"頭金後の残額は2/3。初回は(2/3)×(2/5)＝4/15。残り＝2/3−4/15＝10/15−4/15＝6/15＝2/5。"},
{t:T,s:S,c:"料金・支払い",q:"入場料は大人1200円、子ども800円である。大人と子ども合わせて10人で入場したところ、合計10000円だった。大人は何人か。",ch:["4人","5人","6人","7人"],a:1,e:"大人x人とすると 1200x＋800(10−x)＝10000 → 400x＝2000 → x＝5人。"},
{t:T,s:S,c:"料金・支払い",q:"団体割引で2割引となり、1人あたり500円になった。割引前の通常料金はいくらか。",ch:["600円","625円","650円","700円"],a:1,e:"500÷0.8＝625円。"},

{t:T,s:S,c:"二語関係",q:"「豆腐：大豆」と同じ関係になるのはどれか。",ch:["ワイン：ぶどう","米：ご飯","牛乳：チーズ","小麦：畑"],a:0,e:"「製品：原材料」の関係。ワインはぶどうから作られる。「牛乳：チーズ」は「原材料：製品」で逆。"},
{t:T,s:S,c:"二語関係",q:"「役者：演技」と同じ関係になるのはどれか。",ch:["歌手：歌唱","医者：病院","作家：出版社","観客：拍手"],a:0,e:"「職業：その職業の中心的な行為」の関係。歌手の中心的な行為は歌唱。"},
{t:T,s:S,c:"語句の意味",q:"「腐心」の意味として最も適切なのはどれか。",ch:["あれこれ心を悩ませて努力すること","ひどく落ち込むこと","人の心が信じられないこと","気持ちが腐って怠けること"],a:0,e:"腐心＝ある事を成し遂げようと心を砕き、苦心すること。"},
{t:T,s:S,c:"語句の意味",q:"「割愛」の意味として最も適切なのはどれか。",ch:["惜しいと思いながら省略すること","不要なものを捨てること","半分に分けること","愛情を注ぐこと"],a:0,e:"割愛＝惜しく思うものを思い切って手放す・省くこと。単に「省略」ではなく「惜しみながら」がポイント。"},

{t:T,s:S,c:"語句の意味",q:"「泰然」の意味として最も適切なのはどれか。",ch:["落ち着いていて物事に動じない様子","偉そうに振る舞う様子","のんびりして怠けている様子","自然のままである様子"],a:0,e:"泰然＝落ち着いていて動じないさま。「泰然自若」という形でもよく使われる。"},
{t:T,s:S,c:"語句の意味",q:"「気が置けない」の意味として最も適切なのはどれか。",ch:["遠慮や気遣いがいらない","油断できない","信用できない","気が休まらない"],a:0,e:"気が置けない＝気を遣う必要がなく打ち解けられる。「油断できない」の意味で使うのは誤用。"},
{t:T,s:S,c:"語句の意味",q:"「姑息」の本来の意味として最も適切なのはどれか。",ch:["一時しのぎであること","卑怯であること","ずる賢いこと","古くさいこと"],a:0,e:"姑息＝その場しのぎ、一時の間に合わせ。「卑怯」の意味で使うのは本来は誤用。"},
{t:T,s:S,c:"語句の意味",q:"「敷衍」の意味として最も適切なのはどれか。",ch:["意味を押し広げて詳しく説明すること","簡潔にまとめること","例外を認めること","広く一般に公開すること"],a:0,e:"敷衍（ふえん）＝趣旨を押し広げ、わかりやすく詳しく述べること。"},
{t:T,s:S,c:"語句の意味",q:"「吝嗇」の意味として最も適切なのはどれか。",ch:["ひどく物惜しみをすること","つつましく質素なこと","礼儀正しいこと","心が狭いこと"],a:0,e:"吝嗇（りんしょく）＝過度にけちなこと。「質素・倹約」は肯定的、吝嗇は否定的なニュアンス。"},
{t:T,s:S,c:"語句の用法",q:"「夕方には雨があがった」の「あがる」と同じ用法はどれか。",ch:["ようやく仕事があがった","天ぷらがからりとあがった","人前に出るとあがってしまう","2階にあがった"],a:0,e:"「雨があがる」は「終わる・完了する」の意味。「仕事があがる」も同じ。"},
{t:T,s:S,c:"語句の用法",q:"「母の作った料理」の「の」と同じ用法はどれか。",ch:["風の吹く日は家にいる","私の本を貸してあげた","走るのが好きだ","これは誰のですか"],a:0,e:"「母の作った」の「の」は主格（＝母が作った）。「風の吹く日」も「風が吹く日」に言い換えられる。"},
{t:T,s:S,c:"語句の用法",q:"「壁に絵をかける」の「かける」と同じ用法はどれか。",ch:["ハンガーに服をかける","友人に迷惑をかける","好きな音楽をかける","ドアに鍵をかける"],a:0,e:"「壁に絵をかける」は物を吊り下げる意味。「ハンガーに服をかける」も同じ。"},
{t:T,s:S,c:"語句の用法",q:"「バスで行く」の「で」と同じ用法はどれか。",ch:["ペンで書く","病気で休む","公園で遊ぶ","三人で出かける"],a:0,e:"「バスで」は手段を表す。「ペンで」も手段。「病気で」は原因、「公園で」は場所。"},
{t:T,s:S,c:"語句の用法",q:"「先生が来られる」の「られる」と同じ用法はどれか。",ch:["社長が壇上で話される","犬に吠えられる","朝早く起きられる","故郷が思い出される"],a:0,e:"「先生が来られる」は尊敬。「社長が話される」も尊敬。受身・可能・自発と区別する。"},
{t:T,s:S,c:"語句の用法",q:"「彼は詰めが甘い」の「甘い」と同じ用法はどれか。",ch:["この先生は採点が甘い","このケーキはとても甘い","甘い香りが漂う","甘い言葉に気をつけろ"],a:0,e:"「詰めが甘い」は「厳しさ・厳密さに欠ける」の意味。「採点が甘い」も同じ。"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：しかし　イ：雨が降っていた　ウ：試合は続行された　エ：朝から",ch:["エ→イ→ア→ウ","イ→エ→ウ→ア","ア→イ→エ→ウ","エ→ア→イ→ウ"],a:0,e:"「朝から雨が降っていた。しかし試合は続行された。」"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：健康のために　イ：毎朝　ウ：続けている　エ：ジョギングを",ch:["ア→イ→エ→ウ","イ→ア→ウ→エ","エ→ア→イ→ウ","ア→エ→ウ→イ"],a:0,e:"「健康のために毎朝ジョギングを続けている。」"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：読書は　イ：広げてくれる　ウ：私たちの視野を　エ：単なる娯楽ではなく",ch:["ア→エ→ウ→イ","エ→ア→イ→ウ","ア→ウ→エ→イ","ウ→エ→ア→イ"],a:0,e:"「読書は単なる娯楽ではなく、私たちの視野を広げてくれる。」"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：環境問題は　イ：一国だけでは　ウ：解決できない　エ：もはや",ch:["ア→エ→イ→ウ","エ→ア→ウ→イ","ア→イ→エ→ウ","イ→ア→エ→ウ"],a:0,e:"「環境問題はもはや一国だけでは解決できない。」"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：努力が　イ：実を結ぶとは　ウ：限らない　エ：必ずしも",ch:["ア→エ→イ→ウ","エ→ア→イ→ウ","ア→イ→エ→ウ","エ→イ→ア→ウ"],a:0,e:"「努力が必ずしも実を結ぶとは限らない。」「必ずしも〜とは限らない」の呼応。"},
{t:T,s:S,c:"文の並べ替え",q:"ア〜エを意味が通るように並べ替えたとき、正しい順序はどれか。\nア：まだ　イ：彼の提案には　ウ：残されている　エ：検討の余地が",ch:["イ→ア→エ→ウ","ア→イ→エ→ウ","イ→エ→ア→ウ","エ→イ→ア→ウ"],a:0,e:"「彼の提案にはまだ検討の余地が残されている。」"},
{t:T,s:S,c:"空欄補充",q:"「彼は懸命に練習した。（　　）、結果は振るわなかった。」に入る語はどれか。",ch:["しかし","だから","つまり","そのうえ"],a:0,e:"前後が逆の内容なので逆接の「しかし」。"},
{t:T,s:S,c:"空欄補充",q:"「今日は雨が降りそうだ。（　　）、傘を持って行こう。」に入る語はどれか。",ch:["だから","しかし","ところで","むしろ"],a:0,e:"前が理由、後が結論なので順接の「だから」。"},
{t:T,s:S,c:"空欄補充",q:"「彼は英語が話せる。（　　）フランス語も話せる。」に入る語はどれか。",ch:["さらに","しかし","つまり","なぜなら"],a:0,e:"情報を付け加えているので添加の「さらに」。"},
{t:T,s:S,c:"空欄補充",q:"「（　　）の功名」。ことわざとして正しい語はどれか。",ch:["怪我","偶然","失敗","勝負"],a:0,e:"「怪我の功名」＝失敗や過ちが偶然によい結果をもたらすこと。"},
{t:T,s:S,c:"空欄補充",q:"「彼の説明は（　　）を得ていて分かりやすい。」に入る語はどれか。",ch:["要領","要点","本質","核心"],a:0,e:"「要領を得る」が慣用表現。「要領を得ない」の形でもよく使う。"},
{t:T,s:S,c:"長文読解",p:"技術の進歩は私たちの生活を便利にしてきた。洗濯機は家事の負担を減らし、自動車は移動の範囲を広げ、インターネットは調べものにかかる時間を劇的に短縮した。便利になること自体を否定する人は、ほとんどいないだろう。しかし、便利さと引き換えに失われたものも少なくない。例えば、地図アプリの普及によって、私たちは道を覚える必要がなくなった。その結果、空間を把握する力が弱まったという指摘がある。かつての人々は、目印になる建物や交差点の並びを頭の中に地図として蓄え、それを頼りに歩いていた。今では画面の矢印に従って歩くだけで目的地に着くため、自分がどの方角へ向かっているのかを意識することさえ少なくなった。同じことは記憶についても言える。電話番号を覚えている人は激減し、漢字は読めても手で書けなくなったという声は多い。計算もまた、電卓や表計算ソフトに任せるのが当たり前になった。誤解のないように言えば、道具に頼ること自体が悪いのではない。人類の歴史は能力を道具に委ねてきた歴史でもあり、文字の発明さえ「記憶の外部化」だったと言える。問題は、道具に任せた能力が自分から失われていくことに無自覚なままでいることだ。無自覚のままでは、道具が使えない場面で何もできなくなるだけでなく、自分に何ができて何ができないのかという見積もりを誤るようになる。技術を使いこなすためには、何を道具に任せ、何を自分の力として残すのかを意識的に選び取る態度が必要になる。",q:"筆者の主張として最も適切なのはどれか。",ch:["何を道具に任せるかを意識的に選び取る態度が必要だ","技術の進歩は生活を悪化させてきた","地図アプリは使うべきではない","道具に頼ることはそれ自体が問題である"],a:0,e:"最終文が主張の中心。「道具に頼ること自体が悪いのではない」と明言しているため、他の選択肢は本文と矛盾する。"},
{t:T,s:S,c:"長文読解",p:"技術の進歩は私たちの生活を便利にしてきた。洗濯機は家事の負担を減らし、自動車は移動の範囲を広げ、インターネットは調べものにかかる時間を劇的に短縮した。便利になること自体を否定する人は、ほとんどいないだろう。しかし、便利さと引き換えに失われたものも少なくない。例えば、地図アプリの普及によって、私たちは道を覚える必要がなくなった。その結果、空間を把握する力が弱まったという指摘がある。かつての人々は、目印になる建物や交差点の並びを頭の中に地図として蓄え、それを頼りに歩いていた。今では画面の矢印に従って歩くだけで目的地に着くため、自分がどの方角へ向かっているのかを意識することさえ少なくなった。同じことは記憶についても言える。電話番号を覚えている人は激減し、漢字は読めても手で書けなくなったという声は多い。計算もまた、電卓や表計算ソフトに任せるのが当たり前になった。誤解のないように言えば、道具に頼ること自体が悪いのではない。人類の歴史は能力を道具に委ねてきた歴史でもあり、文字の発明さえ「記憶の外部化」だったと言える。問題は、道具に任せた能力が自分から失われていくことに無自覚なままでいることだ。無自覚のままでは、道具が使えない場面で何もできなくなるだけでなく、自分に何ができて何ができないのかという見積もりを誤るようになる。技術を使いこなすためには、何を道具に任せ、何を自分の力として残すのかを意識的に選び取る態度が必要になる。",q:"「その結果」が指す内容として最も適切なのはどれか。",ch:["地図アプリの普及で道を覚える必要がなくなったこと","技術が進歩したこと","生活が便利になったこと","道具に無自覚に頼っていること"],a:0,e:"直前の文「地図アプリの普及によって、道を覚える必要がなくなった」を受けている。"},

/* 安定ID（端末間同期でも問題を同定できるようハッシュで付与） */
function qhash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return "q"+(h>>>0).toString(36)}
BANK.forEach(q=>q.id=qhash(q.t+"|"+q.c+"|"+(q.p||"")+"|"+(q.tb||"")+"|"+q.q+"|"+q.ch.join("§")));

(function(){const gm={};BANK.forEach(q=>{const k=q.p||q.tb;if(k)(gm[k]=gm[k]||[]).push(q)});let i=0;Object.values(gm).forEach(l=>{if(l.length>1){i++;l.forEach(q=>q.grp="g"+i)}})})();
/* サンプリング後、同一グループを連続配置（テストセンターの組問題形式を再現） */
function groupAdj(arr){const out=[],used=new Set();arr.forEach(q=>{if(used.has(q.id))return;out.push(q);used.add(q.id);if(q.grp)arr.forEach(o=>{if(!used.has(o.id)&&o.grp===q.grp){out.push(o);used.add(o.id)}})});return out}

const $=s=>document.querySelector(s);
function rnd(n){return Math.floor(Math.random()*n)}
function pk(a){return a[rnd(a.length)]}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n){return shuffle(arr.slice()).slice(0,n)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dateStr(off){const d=new Date();d.setDate(d.getDate()+off);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function fmtMin(sec){const m=Math.floor(sec/60);return m>=60?Math.floor(m/60)+"時間"+(m%60)+"分":m+"分"}

/* ---- 自動生成問題（四則逆算・暗算）---- */
function mkChoices(ans,mk){const set=new Set([ans]);let g=0;while(set.size<4&&g++<200){const d=mk();if(d!==null&&d!==ans&&d>0)set.add(d)}const ch=shuffle([...set]);return{ch:ch.map(String),a:ch.indexOf(ans)}}
function genShisoku(){
 const p=rnd(6);let q,ans;
 if(p===0){const a=rnd(11)+2,x=rnd(28)+3;q="□ × "+a+" ＝ "+(a*x);ans=x}
 else if(p===1){const a=rnd(11)+2,b=rnd(18)+2;q="□ ÷ "+a+" ＝ "+b;ans=a*b}
 else if(p===2){const a=rnd(180)+20,b=rnd(180)+20;q=a+" ＋ □ ＝ "+(a+b);ans=b}
 else if(p===3){const a=rnd(90)+10,b=rnd(90)+10;q="□ − "+a+" ＝ "+b;ans=a+b}
 else if(p===4){const a=rnd(8)+2,b=rnd(8)+2,d=rnd(40)+5;q=a+" × "+b+" ＋ □ ＝ "+(a*b+d);ans=d}
 else{const pr=pk([10,20,25,40,50,75]),a=(rnd(15)+2)*20;q=a+" × "+pr+"% ＝ □";ans=a*pr/100}
 const c=mkChoices(ans,()=>ans+pk([-10,-5,-2,-1,1,2,5,10,ans>1?ans:2]));
 return{t:"tama",s:"ks",c:"四則逆算",q,ch:c.ch,a:c.a,e:"答え："+ans+"　□を求める逆算。移項して計算する。",gen:true}
}

 if(p===0){const a=rnd(80)+12,b=rnd(80)+12;q=a+" × "+b;ans=a*b}
 else if(p===1){const b=rnd(14)+6,x=rnd(40)+8;q=(b*x)+" ÷ "+b;ans=x}
 else if(p===2){const pr=pk([15,20,25,30,35,40,45,60,75]),a=(rnd(20)+4)*20;q=a+" の "+pr+"%";ans=a*pr/100}
 else if(p===3){const a=rnd(700)+150,b=rnd(700)+150;q=a+" ＋ "+b;ans=a+b}
 else{const a=rnd(500)+300,b=rnd(280)+10;q=a+" − "+b;ans=a-b}
 const c=mkChoices(ans,()=>ans+pk([-100,-10,-2,-1,1,2,10,100]));
 return{t:"gc",s:"cab",c:"暗算",q,ch:c.ch,a:c.a,e:"答え："+ans,gen:true}
}
/* 追加生成器：図表読取・表推計・損益算・速度算・新型計数 */
function mkCh(ans,mk,fmt){const s=new Set([ans]);let g=0;while(s.size<4&&g++<300){const d=mk();if(d!==ans&&d!==null&&d!==undefined)s.add(d)}const arr=shuffle([...s]);const f=fmt||String;return{ch:arr.map(f),a:arr.indexOf(ans)}}
function miniTbl(hs,vs){return '<table class="dt"><tr>'+hs.map(h=>'<th>'+h+'</th>').join("")+'</tr><tr>'+vs.map(v=>'<td>'+v+'</td>').join("")+'</tr></table>'}
function genZuhyo(){
 const names=["A社","B社","C社"];
 const prev=names.map(()=>((rnd(11)+5)*20));
 const rs=names.map(()=>pk([5,10,15,20,25,-5,-10,-15,-20]));
 const cur=prev.map((p,i)=>Math.round(p*(100+rs[i])/100));
 const tb='<table class="dt"><tr><th>会社</th><th>昨年売上（百万円）</th><th>今年売上（百万円）</th></tr>'+names.map((n,i)=>'<tr><td>'+n+'</td><td>'+prev[i]+'</td><td>'+cur[i]+'</td></tr>').join("")+'</table>';
 const typ=rnd(3);let q,ans,c,e;
 if(typ===0){
  const i=rnd(3);ans=rs[i];
  q=names[i]+"の売上の対昨年増減率はいくらか。";
  c=mkCh(ans,()=>ans+pk([-15,-10,-5,5,10,15]),v=>(v>0?"+":"")+v+"%");
  e="("+cur[i]+"−"+prev[i]+")÷"+prev[i]+"＝"+(ans>0?"+":"")+ans+"%。";
 }else if(typ===1){
  const i=rnd(3);const total=cur[0]+cur[1]+cur[2];ans=Math.round(cur[i]/total*100);
  q="今年の3社合計売上に占める"+names[i]+"の割合に最も近いのはどれか。";
  c=mkCh(ans,()=>{const d=ans+pk([-8,-5,-3,3,5,8]);return d>0&&d<100?d:null},v=>"約"+v+"%");
  e="合計＝"+total+"百万円。"+cur[i]+"÷"+total+"≒"+ans+"%。";
 }else{
  const mx=Math.max(...cur),mn=Math.min(...cur);
  if(mx===mn)return genZuhyo();
  ans=mx-mn;
  q="今年の売上が最大の会社と最小の会社の差はいくらか。";
  c=mkCh(ans,()=>{const d=ans+pk([-30,-20,-10,10,20,30]);return d>0?d:null},v=>v+"百万円");
  e="最大"+mx+"−最小"+mn+"＝"+ans+"百万円。";
 }
 return{t:"tama",s:"ks",c:"図表の読み取り",q,tb,ch:c.ch,a:c.a,e,gen:true};
}
function genSuikei(){
 const p=rnd(4);let tb,ans,e,fmt=String;
 if(p===0){const a=(rnd(8)+2)*10,d=(rnd(6)+1)*5;
  tb=miniTbl(["1期","2期","3期","4期"],[a,a+d,a+2*d,"？"]);ans=a+3*d;
  e="毎期＋"+d+"の等差。"+(a+2*d)+"＋"+d+"＝"+ans+"。";
 }else if(p===1){const a=pk([40,80,120,160]),r=pk([1.5,2]);
  const v3=a*r*r;tb=miniTbl(["1期","2期","3期","4期"],[a,a*r,v3,"？"]);ans=v3*r;
  e="毎期×"+r+"の等比。"+v3+"×"+r+"＝"+ans+"。";
 }else if(p===2){const u=pk([120,150,180,250]),n1=rnd(30)+10,n2=rnd(30)+10;
  tb='<table class="dt"><tr><th>商品</th><th>単価（円）</th><th>数量（個）</th><th>売上（円）</th></tr><tr><td>A</td><td>'+u+'</td><td>'+n1+'</td><td>'+(u*n1)+'</td></tr><tr><td>B</td><td>'+u+'</td><td>？</td><td>'+(u*n2)+'</td></tr></table>';
  ans=n2;e="売上÷単価＝"+(u*n2)+"÷"+u+"＝"+ans+"個。";
 }else{const a=rnd(30)+15,b=rnd(30)+15,cc=rnd(20)+10,rest=100-a-b-cc;
  if(rest<5)return genSuikei();
  tb=miniTbl(["A","B","C","D"],[a+"%",b+"%",cc+"%","？"]);ans=rest;fmt=v=>v+"%";
  e="構成比の合計は100%。100−("+a+"＋"+b+"＋"+cc+")＝"+ans+"%。";
 }
 const c=mkCh(ans,()=>{const d=ans+pk([-10,-5,-2,2,5,10]);return d>0?d:null},fmt);
 return{t:"tama",s:"ks",c:"表の空欄推測",q:"表の規則性から「？」に入る値を推測せよ。",tb,ch:c.ch,a:c.a,e,gen:true};
}
function genSonneki(){
 const cst=(rnd(12)+4)*100,p=pk([20,30,40,50]),d=pk([10,20]);
 const teika=cst*(100+p)/100,baika=teika*(100-d)/100;
 if(baika<=cst)return genSonneki();
 const typ=rnd(3);let q,ans;
 if(typ===0){q="原価"+cst+"円の商品に"+p+"%の利益を見込んで定価をつけた。定価はいくらか。";ans=teika}
 else if(typ===1){q="原価"+cst+"円の商品に"+p+"%の利益を見込んで定価をつけ、その定価の"+d+"%引きで売った。売価はいくらか。";ans=baika}
 else{q="原価"+cst+"円の商品に"+p+"%の利益を見込んで定価をつけ、その定価の"+d+"%引きで売った。利益はいくらか。";ans=baika-cst}
 const c=mkCh(ans,()=>{const dd=ans+pk([-200,-100,-50,50,100,200]);return dd>0?dd:null},v=>v+"円");
 return{t:"spi",s:"nv",c:"損益算",q,ch:c.ch,a:c.a,e:"定価＝"+cst+"×"+(1+p/100)+"＝"+teika+"円。売価＝"+teika+"×"+(1-d/100)+"＝"+baika+"円。利益＝売価−原価＝"+(baika-cst)+"円。",gen:true};
}
function genHayasa(){
 const typ=rnd(4);let q,ans,unit,e;
 if(typ===0){const v=pk([40,50,60,80]),t=pk([1.5,2,2.5,3]);ans=v*t;unit="km";q="時速"+v+"kmで"+t+"時間走ると、何km進むか。";e=v+"×"+t+"＝"+ans+"km。"}
 else if(typ===1){const v=pk([4,5,60,80]),t=pk([2,3,4]);const dd=v*t;ans=t;unit="時間";q=(v<10?"時速"+v+"kmで歩いて":"時速"+v+"kmの車で")+dd+"kmの道のりを進むと、何時間かかるか。";e=dd+"÷"+v+"＝"+ans+"時間。"}
 else if(typ===2){const pr=pk([[60,40,48],[60,30,40],[80,48,60],[90,60,72]]);ans=pr[2];unit="km/h";q="行きは時速"+pr[0]+"km、帰りは同じ道を時速"+pr[1]+"kmで往復した。往復の平均時速はいくらか。";e="平均時速＝2×"+pr[0]+"×"+pr[1]+"÷("+pr[0]+"＋"+pr[1]+")＝"+ans+"km/h。"}
 else{const L=pk([1200,1500,1800,3000]),v1=pk([80,90]),v2=150-v1;ans=L/150;unit="分後";q=L+"m離れた2地点からAとBが向かい合って同時に出発した。Aは分速"+v1+"m、Bは分速"+v2+"mで進む。2人が出会うのは何分後か。";e="2人合わせて毎分150m近づく。"+L+"÷150＝"+ans+"分後。"}
 const c=mkCh(ans,()=>{const d=ans+pk([-4,-2,-1,1,2,4]);return d>0?d:null},v=>v+unit);
 return{t:"spi",s:"nv",c:"速度算",q,ch:c.ch,a:c.a,e,gen:true};
}
function genShinkei(){const g=genShisoku();g.t="tg";g.s="ks";g.c="新型計数";return g}
const GEN_CATS=[
 {t:"tama",s:"ks",c:"四則逆算",gen:genShisoku},
 {t:"tama",s:"ks",c:"図表の読み取り",gen:genZuhyo},
 {t:"tama",s:"ks",c:"表の空欄推測",gen:genSuikei},
 {t:"spi",s:"nv",c:"損益算",gen:genSonneki},
 {t:"spi",s:"nv",c:"速度算",gen:genHayasa},

];

function bySec(t,s){return BANK.filter(q=>q.t===t&&q.s===s)}
function byCat(t,c){return BANK.filter(q=>q.t===t&&q.c===c)}
function catsFor(t,s){const seen=[];GEN_CATS.forEach(g=>{if(g.t===t&&g.s===s)seen.push(g.c)});BANK.forEach(q=>{if(q.t===t&&q.s===s&&!seen.includes(q.c))seen.push(q.c)});return seen}

function record(q,ok){
 const k=q.t+"|"+q.c;const r=S.res[k]||(S.res[k]={n:0,c:0});r.n++;if(ok)r.c++;
 if(q.id!=null){if(!ok){if(!S.wrong.includes(q.id))S.wrong.push(q.id)}else{S.wrong=S.wrong.filter(x=>x!==q.id)}}
 save();

function streak(){let n=0;const start=(S.days[today()]||0)>0?0:-1;for(let i=0;;i++){if((S.days[dateStr(start-i)]||0)>0)n++;else break}return n}
function weakCats(min){return Object.entries(S.res).filter(([k,r])=>r.n>=min).map(([k,r])=>({k,acc:r.c/r.n,n:r.n})).sort((a,b)=>a.acc-b.acc)}

let SES=null,tickH=null;
function startSession(o){SES={qs:o.qs,i:0,mode:o.mode,name:o.name,limit:(o.min||0)*60,left:(o.min||0)*60,elapsed:0,ans:[],correct:0,answered:false};clearInterval(tickH);tickH=setInterval(tick,1000);route("session")}
function tick(){
 if(!SES||document.visibilityState!=="visible")return;
 SES.elapsed++;S.days[today()]=(S.days[today()]||0)+1;if(SES.elapsed%15===0)save();
 if(SES.limit){SES.left--;const el=$("#timer");if(el){el.textContent=fmtMS(Math.max(0,SES.left));el.classList.toggle("warn",SES.left<60)}if(SES.left<=0){finishSession();return}}
 else{const el=$("#timer");if(el)el.textContent=fmtMS(SES.elapsed)}
}
function endSession(){clearInterval(tickH);tickH=null;SES=null;save()}
function answer(i){
 if(!SES)return;const q=SES.qs[SES.i];
 if(SES.mode==="practice"){
  if(SES.answered)return;SES.answered=true;
  const ok=i===q.a;if(ok)SES.correct++;record(q,ok);
  renderSession(i);
 }else{
  SES.ans[SES.i]=i;const ok=i===q.a;if(ok)SES.correct++;record(q,ok);
  nextQ();
 }
}
function nextQ(){
 if(!SES)return;
 if(SES.i>=SES.qs.length-1){finishSession();return}
 SES.i++;SES.answered=false;renderSession(null);
}
function finishSession(){
 if(!SES)return;const s=SES;clearInterval(tickH);tickH=null;save();
 if(s.mode==="mock"){
  const cats={};s.qs.forEach((q,i)=>{const k=q.t+"|"+q.c;const c=cats[k]||(cats[k]={n:0,c:0});c.n++;if(s.ans[i]===q.a)c.c++});
  S.mocks.push({d:today(),name:s.name,score:s.correct,total:s.qs.length,time:s.elapsed});
  if(S.mocks.length>30)S.mocks=S.mocks.slice(-30);
  save();renderMockResult(s,cats);
 }else{renderPracticeResult(s)}
 SES=null;
}

 h+='<h2>問題数</h2><div class="chips">'+[5,10,20,30].map(n=>'<button class="chip '+(PSEL.n===n?"on":"")+'" onclick="setP(\'n\','+n+')">'+n+'問</button>').join("")+'</div>';

function startPractice(){
 const{t,s,c,n}=PSEL;let qs=[];
 if(c==="__weak"){qs=sample(S.wrong.map(id=>BANK.find(q=>q.id===id)).filter(Boolean),n)}
 else{
  const pool=BANK.filter(q=>q.t===t&&q.s===s&&(c==="all"||q.c===c));
  qs=groupAdj(sample(pool,Math.min(n,pool.length)));
  const g=GEN_CATS.find(x=>x.t===t&&x.s===s&&(c==="all"?pool.length<n:c===x.c));
  if(g)while(qs.length<n)qs.push(g.gen());
 }
 if(!qs.length){alert("この条件の問題がありません");return}
 startSession({qs,mode:"practice",name:"練習"});
}

function renderMockList(){

function startMock(i){const m=MOCKS[i];const qs=m.make().filter(Boolean);if(!qs.length){alert("問題が不足しています");return}startSession({qs,mode:"mock",name:m.name,min:m.min})}

/* ---- セッション描画 ---- */
function renderSession(clicked){
 if(!SES){route("home");return}
 const q=SES.qs[SES.i],practice=SES.mode==="practice";
 let h='<div class="card"><div class="row" style="justify-content:space-between"><span class="muted">'+esc(SES.name)+'　'+(SES.i+1)+' / '+SES.qs.length+'</span><span>'+(SES.limit?"残り ":"")+'<span id="timer" class="timer'+(SES.limit&&SES.left<60?" warn":"")+'">'+fmtMS(SES.limit?SES.left:SES.elapsed)+'</span></span></div><div class="pbar"><div style="width:'+Math.round(SES.i/SES.qs.length*100)+'%"></div></div>';
 h+='<div class="muted"><span class="tag">'+esc(TESTS[q.t].name)+'</span>'+esc(q.c)+'</div>';
 if(q.p)h+='<div class="passage">'+esc(q.p)+'</div>';
 if(q.tb)h+=q.tb;
 h+='<div class="qtext">'+esc(q.q)+'</div><div class="choices">';
 q.ch.forEach((c,i)=>{
  let cls="choice";
  if(practice&&SES.answered){if(i===q.a)cls+=" ok";else if(i===clicked)cls+=" ng"}
  h+='<button class="'+cls+'" '+(practice&&SES.answered?"disabled":"")+' onclick="answer('+i+')">'+"ABCDEF"[i]+'．'+esc(c)+'</button>';
 });
 h+='</div>';
 if(practice&&SES.answered){
  const ok=clicked===q.a;
  h+='<div class="expl'+(ok?"":" bad")+'"><b>'+(ok?"正解":"不正解（正解："+"ABCDEF"[q.a]+"）")+'</b>\n'+esc(q.e||"")+'</div>';
  h+='<div style="margin-top:12px"><button class="btn" onclick="nextQ()">'+(SES.i>=SES.qs.length-1?"結果を見る":"次の問題へ")+'</button></div>';
 }
 h+='<div style="margin-top:10px" class="center"><button class="chip" onclick="finishSession()">終了する</button></div></div>';
 $("#main").innerHTML=h;
}
function renderPracticeResult(s){
 const n=Math.max(1,(s.mode==="practice"?(s.answered?s.i+1:s.i):s.qs.length));
 $("#main").innerHTML='<div class="card center"><h2>練習結果</h2><div class="big">'+s.correct+' / '+n+'</div><div class="muted">正答率 '+Math.round(s.correct/n*100)+'%　時間 '+fmtMS(s.elapsed)+'</div><div style="margin-top:14px"><button class="btn" onclick="route(\'practice\')">もう一度練習する</button></div><div style="margin-top:8px"><button class="btn sub" onclick="route(\'home\')">ホームへ</button></div></div>';
}
function renderMockResult(s,cats){
 let h='<div class="card center"><h2>'+esc(s.name)+'　結果</h2><div class="big">'+s.correct+' / '+s.qs.length+'</div><div class="muted">正答率 '+Math.round(s.correct/s.qs.length*100)+'%　所要 '+fmtMS(s.elapsed)+'</div></div>';
 h+='<div class="card"><h2>分野別</h2>'+Object.entries(cats).map(([k,c])=>'<div class="statrow"><span style="min-width:130px">'+esc(catLabel(k))+'</span><div class="sbar"><div style="width:'+Math.round(c.c/c.n*100)+'%;background:var(--acc)"></div></div><span style="min-width:60px;text-align:right">'+c.c+'/'+c.n+'</span></div>').join("")+'</div>';
 h+='<div class="card"><h2>全問の振り返り</h2>'+s.qs.map((q,i)=>{
  const my=s.ans[i];const ok=my===q.a;
  return '<div style="border-bottom:1px solid var(--line);padding:10px 0"><div class="muted">Q'+(i+1)+'　'+esc(q.c)+'　'+(ok?'<b style="color:var(--ok)">正解</b>':(my==null?'<b style="color:var(--ng)">未回答</b>':'<b style="color:var(--ng)">不正解</b>'))+'</div><div style="font-size:13.5px;white-space:pre-wrap">'+esc(q.q)+'</div><div style="font-size:13px">正解：'+"ABCDEF"[q.a]+'．'+esc(q.ch[q.a])+(my!=null&&!ok?'　<span style="color:var(--ng)">あなた：'+"ABCDEF"[my]+'</span>':"")+'</div>'+(q.e?'<div class="muted" style="white-space:pre-wrap">'+esc(q.e)+'</div>':"")+'</div>';
 }).join("")+'</div>';
 h+='<button class="btn" onclick="route(\'mock\')">模試一覧へ</button>';
 $("#main").innerHTML=h;
}

/* ---- 成績 ---- */
function renderStats(){
 const rows=Object.entries(S.res).sort((a,b)=>(b[1].n-a[1].n));
 let h='<div class="card"><h2>分野別成績</h2>'+(rows.length?rows.map(([k,r])=>{const acc=r.c/r.n;return '<div class="statrow"><span style="min-width:130px">'+esc(catLabel(k))+'</span><div class="sbar"><div style="width:'+Math.round(acc*100)+'%;background:'+(acc<.6?"var(--ng)":acc<.8?"#e8a13c":"var(--ok)")+'"></div></div><span style="min-width:80px;text-align:right">'+Math.round(acc*100)+'%（'+r.n+'問）</span></div>'}).join(""):'<div class="muted">まだ記録がありません</div>')+'</div>';
 h+='<div class="card"><h2>模試の履歴</h2>'+(S.mocks.length?S.mocks.slice().reverse().map(m=>'<div class="statrow"><span style="flex:1">'+esc(m.name)+'</span><span>'+m.score+'/'+m.total+'</span><span class="muted" style="min-width:80px;text-align:right">'+m.d+'</span></div>').join(""):'<div class="muted">まだ模試を受けていません</div>')+'</div>';
 $("#main").innerHTML=h;
}

  authDomain: "webtest-195d1.firebaseapp.com",
  projectId: "webtest-195d1",

}; /* ←セットアップ手順書 STEP4：ここをFirebaseの設定オブジェクトに置き換える */
let fbUser=null,fbLoaded=false,pushT=null,lastSync="";
function fbScript(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
async function fbInit(){
 if(!FB_CONFIG||fbLoaded)return;fbLoaded=true;
 try{
  await fbScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js");
  await fbScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js");
  await fbScript("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js");
  firebase.initializeApp(FB_CONFIG);
  firebase.auth().onAuthStateChanged(async u=>{fbUser=u;if(u)await syncNow();if(VIEW==="data")renderData()});
 }catch(e){fbLoaded=false}
}
function fbLogin(){const p=new firebase.auth.GoogleAuthProvider();firebase.auth().signInWithPopup(p).catch(()=>firebase.auth().signInWithRedirect(p))}
function fbLogout(){firebase.auth().signOut()}
function fbDoc(){return firebase.firestore().collection("users").doc(fbUser.uid)}
function mergeState(a,b){
 if(!b)return a;if(!a)return b;
 const newer=(b.ts||0)>(a.ts||0)?b:a;
 const m={res:{},days:{},mocks:[],wrong:[],goal:newer.goal||30,ts:Math.max(a.ts||0,b.ts||0)};
 new Set(Object.keys(a.res||{}).concat(Object.keys(b.res||{}))).forEach(k=>{const x=(a.res||{})[k],y=(b.res||{})[k];m.res[k]=!x?y:(!y?x:(x.n>=y.n?x:y))});
 new Set(Object.keys(a.days||{}).concat(Object.keys(b.days||{}))).forEach(d=>{m.days[d]=Math.max((a.days||{})[d]||0,(b.days||{})[d]||0)});
 const seen=new Set();(a.mocks||[]).concat(b.mocks||[]).forEach(x=>{const k=x.d+"|"+x.name+"|"+x.score+"/"+x.total;if(!seen.has(k)){seen.add(k);m.mocks.push(x)}});
 m.mocks.sort((x,y)=>x.d<y.d?-1:(x.d>y.d?1:0));m.mocks=m.mocks.slice(-30);
 m.wrong=Array.from(new Set((a.wrong||[]).concat(b.wrong||[])));
 return m;
}
async function syncNow(){
 if(!fbUser)return;
 try{
  const snap=await fbDoc().get();
  const remote=snap.exists?snap.data():null;
  S=mergeState(S,remote);S.ts=Date.now();
  try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}
  await fbDoc().set(S);
  lastSync=new Date().toLocaleString("ja-JP");
  if(VIEW==="data")renderData();
 }catch(e){}
}
function schedulePush(){if(!fbUser)return;clearTimeout(pushT);pushT=setTimeout(()=>{S.ts=Date.now();fbDoc().set(S).then(()=>{lastSync=new Date().toLocaleString("ja-JP")}).catch(()=>{})},8000)}

/* ---- データ ---- */
function renderData(){
 let sync;
 if(!FB_CONFIG)sync='<div class="card"><h2>Google同期</h2><div class="muted">未設定です。セットアップ手順書のSTEP4（Firebase設定）を行うと、Googleアカウントでログインして端末間の自動同期が使えるようになります。それまでは下のエクスポート/インポートで引き継げます。</div></div>';
 else if(!fbUser)sync='<div class="card"><h2>Google同期</h2><button class="btn sm" onclick="fbLogin()">Googleでログイン</button><div class="muted" style="margin-top:8px">ログインすると成績・学習時間・設定が自動で同期されます。</div></div>';
 else sync='<div class="card"><h2>Google同期</h2><div>ログイン中：'+esc(fbUser.email||"")+'</div><div class="muted">最終同期：'+(lastSync||"—")+'（変更は数秒後に自動保存）</div><div class="row" style="margin-top:8px"><button class="btn sm" onclick="syncNow()">今すぐ同期</button><button class="btn sm sub" onclick="fbLogout()">ログアウト</button></div></div>';
 $("#main").innerHTML=sync+
 '<div class="card"><h2>エクスポート（手動での引き継ぎ）</h2><div class="muted">成績・学習時間・設定をJSONとして書き出します。iPhoneへはテキストをコピーしてメモ・メール等で送るのが簡単です。</div><div style="margin-top:10px" class="row"><button class="btn sm" onclick="expFile()">ファイル保存</button><button class="btn sm sub" onclick="expCopy()">テキスト表示</button></div><textarea id="expbox" placeholder="「テキスト表示」を押すとここに出ます。全選択してコピーしてください。"></textarea></div>'
 +'<div class="card"><h2>インポート</h2><div class="muted">エクスポートしたJSONを貼り付けるか、ファイルを選択してください。現在のデータは上書きされます。</div><textarea id="impbox" placeholder="ここにJSONを貼り付け"></textarea><div style="margin-top:8px" class="row"><button class="btn sm" onclick="impText()">貼り付けた内容を読み込む</button><input type="file" accept=".json,application/json" onchange="impFile(this)"></div></div>'
 +'<div class="card"><h2>リセット</h2><button class="btn sm" style="background:var(--ng)" onclick="if(confirm(\'全データを削除します。よろしいですか？\')){localStorage.removeItem(KEY);S=loadState();route(\'home\')}">全データを削除</button></div>'
 +'<div class="muted">※ データはこのブラウザ内（localStorage）に保存され、Google同期を設定すればFirestoreにも保存されます。プライベートブラウズでは保存されません。</div>';
}
function expFile(){const b=new Blob([JSON.stringify(S)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="webtest_data_"+today()+".json";a.click()}
function expCopy(){$("#expbox").value=JSON.stringify(S)}
function impText(){applyImport($("#impbox").value)}
function impFile(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=()=>applyImport(r.result);r.readAsText(f)}
function applyImport(txt){try{const d=JSON.parse(txt);if(!d||typeof d!=="object"||!d.res)throw 0;S=Object.assign({res:{},days:{},mocks:[],wrong:[],goal:30},d);save();alert("読み込みました");route("home")}catch(e){alert("読み込みに失敗しました。JSONの内容を確認してください。")}}

route("home");
fbInit();
if("serviceWorker" in navigator&&location.protocol==="https:")navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
