<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Webテスト対策トレーナー</title>
 <link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#3949ab">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Webテスト">
<style>
:root{--bg:#f2f4f9;--card:#fff;--ink:#1e2633;--sub:#69758a;--acc:#3949ab;--accL:#e8eaf6;--ok:#2e9e5b;--okL:#e6f5ec;--ng:#d64545;--ngL:#fbeaea;--line:#dfe4ee}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.7}
header{background:var(--acc);color:#fff;padding:12px 16px}
header h1{font-size:16px;margin:0;font-weight:700}
nav{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
nav button{flex:1;padding:11px 2px;border:none;background:none;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;font-family:inherit}
nav button.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:700}
main{max-width:720px;margin:0 auto;padding:14px 12px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{font-size:14px;margin:0 0 10px;color:var(--acc)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer;font-family:inherit}
.chip.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;background:var(--acc);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn.sub{background:#fff;color:var(--acc);border:1.5px solid var(--acc)}
.btn.sm{width:auto;display:inline-block;padding:8px 18px;font-size:13px}
.muted{color:var(--sub);font-size:12.5px}
.row{display:flex;gap:10px;align-items:center}
.big{font-size:26px;font-weight:800}
.pbar{height:8px;background:var(--accL);border-radius:99px;overflow:hidden;margin:6px 0}
.pbar>div{height:100%;background:var(--acc);border-radius:99px}
.dcols{display:flex;gap:6px;align-items:flex-end;height:56px;margin-top:8px}
.dcol{flex:1;text-align:center}
.dbar{background:var(--acc);border-radius:4px 4px 0 0;margin:0 auto;width:70%}
.dlab{font-size:10px;color:var(--sub);margin-top:2px}
.qtext{font-size:15.5px;margin:10px 0;white-space:pre-wrap}
.passage{background:#f7f8fc;border:1px solid var(--line);border-radius:8px;padding:12px;font-size:13.5px;white-space:pre-wrap;margin-bottom:10px;max-height:300px;overflow-y:auto}
.choices{display:flex;flex-direction:column;gap:8px}
.choice{text-align:left;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:14.5px;cursor:pointer;font-family:inherit;line-height:1.5}
.choice.ok{background:var(--okL);border-color:var(--ok);font-weight:700}
.choice.ng{background:var(--ngL);border-color:var(--ng)}
.choice:disabled{opacity:.92;cursor:default}
.expl{background:var(--okL);border:1px solid var(--ok);border-radius:10px;padding:12px;margin-top:12px;font-size:13.5px;white-space:pre-wrap}
.expl.bad{background:var(--ngL);border-color:var(--ng)}
.timer{font-weight:800;font-variant-numeric:tabular-nums}
.timer.warn{color:var(--ng)}
table.dt{border-collapse:collapse;margin:8px 0;font-size:12.5px;width:100%}
table.dt th,table.dt td{border:1px solid #c6cede;padding:5px 7px;text-align:right}
table.dt th{background:var(--accL);text-align:center}
table.dt td:first-child{text-align:left}
.statrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.statrow:last-child{border-bottom:none}
.sbar{flex:1;height:8px;background:#edf0f7;border-radius:99px;overflow:hidden}
.sbar>div{height:100%;border-radius:99px}
.tag{display:inline-block;font-size:11px;background:var(--accL);color:var(--acc);border-radius:5px;padding:1px 7px;margin-right:6px}
textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px;font-family:inherit}
input[type=number]{width:70px;padding:6px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit}
.mockitem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);gap:10px}
.mockitem:last-child{border-bottom:none}
.center{text-align:center}
</style>
</head>
<body>
<header><h1>Webテスト対策トレーナー</h1></header>
<nav id="nav"></nav>
<main id="main"></main>
<script>
"use strict";
/* ================= 問題データ ================= */
const BANK=[];
/* ---- SPI 非言語 ---- */
(function(){const T="spi",S="nv";BANK.push(
{t:T,s:S,c:"推論",q:"P、Q、R、Sの4人が徒競走をした。PはQより速く、SはRより速く、QはRより遅かった。確実に言えるのはどれか。",ch:["SはQより速い","PはSより速い","RはPより遅い","QはSより速い"],a:0,e:"条件を整理すると S＞R＞Q、P＞Q。SはRより速くRはQより速いので、S＞Qは確実。PとS・Rの関係は不明。"},
{t:T,s:S,c:"推論",q:"A〜Eの5人の身長について、AはBより高く、BはCより高く、DはAより高く、CはEより高い。確実に最も低いのは誰か。",ch:["B","C","E","この条件では決まらない"],a:2,e:"D＞A＞B＞C＞E と一列に並ぶので、最も低いのはE。"},
{t:T,s:S,c:"推論",q:"A「犯人はBだ」 B「私は犯人ではない」 C「犯人はAだ」。犯人は1人で、3人のうち嘘をついているのは1人だけである。犯人は誰か。",ch:["A","B","C","特定できない"],a:0,e:"犯人をAと仮定：Aの発言は嘘、B・Cは本当→嘘つき1人で成立。B犯人ならA本当・B嘘・C嘘で2人、C犯人ならA嘘・B本当・C嘘で2人となり矛盾。"},
{t:T,s:S,c:"推論",q:"X、Y、Zは営業・経理・総務のいずれか別々の部署に所属している。Xは経理ではなく、Zは総務である。Yの部署はどこか。",ch:["営業","経理","総務","特定できない"],a:1,e:"Zが総務なので、Xは営業か経理。Xは経理ではないから営業。残るYが経理。"},
{t:T,s:S,c:"推論",q:"マラソンで5人が走っている。Aはゴール直前で3位の人を追い抜いた。ゴール時のAの順位は何位か。",ch:["2位","3位","4位","5位"],a:1,e:"3位の人を抜くと、その人の順位に入れ替わるので3位。2位にはならない点に注意。"},
{t:T,s:S,c:"推論",q:"リンゴ2個はミカン3個と同じ重さで、ミカン6個はモモ2個と同じ重さである。リンゴ4個はモモ何個分の重さか。",ch:["1個","2個","3個","4個"],a:1,e:"ミカン3個＝モモ1個。リンゴ2個＝ミカン3個＝モモ1個なので、リンゴ4個＝モモ2個。"},
{t:T,s:S,c:"推論",q:"「サッカーが好きな人は野球も好きである」が正しいとき、確実に言えるのはどれか。",ch:["野球が好きでない人はサッカーも好きでない","野球が好きな人はサッカーも好き","サッカーが好きでない人は野球も好きでない","野球が好きな人はサッカーが好きでない"],a:0,e:"命題が正しいとき確実に言えるのは対偶。「サッカー好き→野球好き」の対偶は「野球が好きでない→サッカーが好きでない」。逆や裏は必ずしも成り立たない。"},
{t:T,s:S,c:"推論",q:"A、B、Cの所持金の合計は9500円である。AはBより1000円多く、CはBより500円少ない。Bの所持金はいくらか。",ch:["2500円","3000円","3500円","4000円"],a:1,e:"B＋(B＋1000)＋(B−500)＝9500 → 3B＋500＝9500 → B＝3000円。"},
{t:T,s:S,c:"推論",q:"6人が横一列に並んでいる。両端はAとF（Aが左端）。BはAの隣、EはFの隣で、CはDの左隣である。Dは左から何番目か。",ch:["2番目","3番目","4番目","5番目"],a:2,e:"A B ＿ ＿ E F が確定し、残るC・DはCがDの左なので A B C D E F。Dは左から4番目。"},
{t:T,s:S,c:"推論",q:"ある月の3日は水曜日である。この月の20日は何曜日か。",ch:["木曜日","金曜日","土曜日","日曜日"],a:2,e:"3日が水曜なら10日・17日も水曜。20日は17日の3日後なので土曜日。"},
{t:T,s:S,c:"割合・比",q:"ある会社では男性が全体の60%を占める。女性が140人のとき、社員は全部で何人か。",ch:["230人","280人","350人","400人"],a:2,e:"女性は全体の40%にあたる。140÷0.4＝350人。"},
{t:T,s:S,c:"割合・比",q:"昨年の売上は200万円だった。今年は昨年より15%増加した。今年の売上はいくらか。",ch:["215万円","220万円","230万円","240万円"],a:2,e:"200×1.15＝230万円。"},
{t:T,s:S,c:"割合・比",q:"濃度10%の食塩水300gに水を100g加えると、濃度は何%になるか。",ch:["6.5%","7.5%","8%","8.5%"],a:1,e:"食塩は300×0.1＝30gのまま。全体は400gになるので 30÷400＝7.5%。"},
{t:T,s:S,c:"割合・比",q:"A:B＝3:5、B:C＝10:7 のとき、A＋B＋C＝230 ならAはいくつか。",ch:["50","60","70","80"],a:1,e:"Bを10にそろえると A:B:C＝6:10:7。合計23が230にあたるので1あたり10。A＝60。"},
{t:T,s:S,c:"割合・比",q:"4人のテストの平均点は70点である。3人の点数が75点、68点、62点のとき、残り1人の点数は何点か。",ch:["70点","72点","75点","78点"],a:2,e:"合計は70×4＝280点。280−(75＋68＋62)＝280−205＝75点。"},
{t:T,s:S,c:"損益算",q:"原価800円の商品に25%の利益を見込んで定価をつけた。定価はいくらか。",ch:["900円","950円","1000円","1200円"],a:2,e:"800×1.25＝1000円。"},
{t:T,s:S,c:"損益算",q:"定価1500円の商品を2割引で売った。売価はいくらか。",ch:["1200円","1250円","1300円","1350円"],a:0,e:"1500×0.8＝1200円。"},
{t:T,s:S,c:"損益算",q:"原価1200円の商品に3割の利益を見込んで定価をつけ、その定価の1割引で売った。利益はいくらか。",ch:["156円","180円","204円","240円"],a:2,e:"定価＝1200×1.3＝1560円。売価＝1560×0.9＝1404円。利益＝1404−1200＝204円。"},
{t:T,s:S,c:"損益算",q:"ある商品を定価の20%引きで売っても、原価の12%の利益が出る。定価は原価の何%増しか。",ch:["30%","35%","40%","45%"],a:2,e:"定価をx、原価をcとすると 0.8x＝1.12c → x＝1.4c。よって40%増し。"},
{t:T,s:S,c:"損益算",q:"1個600円で仕入れた商品100個を、80個は定価900円で売り、残り20個は定価の半額で売った。全体の利益はいくらか。",ch:["15000円","18000円","21000円","24000円"],a:2,e:"売上＝900×80＋450×20＝72000＋9000＝81000円。仕入れ＝600×100＝60000円。利益＝21000円。"},
{t:T,s:S,c:"損益算",q:"消費税10%を含む支払額が1100円だった。税抜き価格はいくらか。",ch:["990円","1000円","1010円","1090円"],a:1,e:"1100÷1.1＝1000円。"},
{t:T,s:S,c:"速度算",q:"時速60kmの車で45分走ると、何km進むか。",ch:["40km","45km","48km","50km"],a:1,e:"45分＝0.75時間。60×0.75＝45km。"},
{t:T,s:S,c:"速度算",q:"12kmの道のりを時速4kmで歩くと、何時間かかるか。",ch:["2時間","2時間30分","3時間","3時間30分"],a:2,e:"12÷4＝3時間。"},
{t:T,s:S,c:"速度算",q:"行きは時速60km、帰りは同じ道を時速40kmで往復した。往復の平均時速はいくらか。",ch:["45km/h","48km/h","50km/h","52km/h"],a:1,e:"平均時速＝2×60×40÷(60＋40)＝4800÷100＝48km/h。単純平均の50にならない点に注意。"},
{t:T,s:S,c:"速度算",q:"16km離れた2地点から、AとBが向かい合って同時に出発した。Aは時速5km、Bは時速3kmで進む。2人が出会うのは出発から何時間後か。",ch:["1.5時間後","2時間後","2.5時間後","3時間後"],a:1,e:"2人合わせて1時間に8km近づく。16÷8＝2時間後。"},
{t:T,s:S,c:"速度算",q:"長さ200mの列車が時速72kmで走っている。長さ600mの鉄橋を渡り始めてから渡り終わるまで何秒かかるか。",ch:["30秒","35秒","40秒","45秒"],a:2,e:"時速72km＝秒速20m。渡り切る距離は橋600m＋列車200m＝800m。800÷20＝40秒。"},
{t:T,s:S,c:"場合の数",q:"5人の中から2人の代表を選ぶ選び方は何通りか。",ch:["10通り","15通り","20通り","25通り"],a:0,e:"組み合わせ 5C2＝(5×4)÷(2×1)＝10通り。"},
{t:T,s:S,c:"場合の数",q:"4人を一列に並べる並べ方は何通りか。",ch:["12通り","16通り","24通り","32通り"],a:2,e:"4!＝4×3×2×1＝24通り。"},
{t:T,s:S,c:"場合の数",q:"男子3人、女子2人の中から男子1人と女子1人を選ぶ選び方は何通りか。",ch:["5通り","6通り","8通り","10通り"],a:1,e:"3×2＝6通り。"},
{t:T,s:S,c:"場合の数",q:"0、1、2、3の4枚のカードから3枚を使って3桁の整数を作る。何通りできるか。",ch:["18通り","24通り","12通り","16通り"],a:0,e:"百の位は0以外の3通り、十の位は残り3通り、一の位は残り2通り。3×3×2＝18通り。"},
{t:T,s:S,c:"場合の数",q:"6人の中から委員長1人と副委員長1人を選ぶ選び方は何通りか。",ch:["15通り","20通り","30通り","36通り"],a:2,e:"役職の区別があるので順列。6×5＝30通り。"},
{t:T,s:S,c:"確率",q:"サイコロを2個同時に振ったとき、出た目の和が5になる確率はいくらか。",ch:["1/12","1/9","1/6","5/36"],a:1,e:"和が5になるのは(1,4)(2,3)(3,2)(4,1)の4通り。4/36＝1/9。"},
{t:T,s:S,c:"確率",q:"コインを3回投げたとき、表がちょうど2回出る確率はいくらか。",ch:["1/4","3/8","1/2","5/8"],a:1,e:"全体は2³＝8通り。表2回は3C2＝3通り。3/8。"},
{t:T,s:S,c:"確率",q:"赤玉3個、白玉2個が入った袋から同時に2個取り出すとき、2個とも赤である確率はいくらか。",ch:["1/5","3/10","2/5","1/2"],a:1,e:"3C2÷5C2＝3÷10＝3/10。"},
{t:T,s:S,c:"確率",q:"サイコロを1個振ったとき、偶数かつ4以上の目が出る確率はいくらか。",ch:["1/6","1/3","1/2","2/3"],a:1,e:"該当するのは4と6の2通り。2/6＝1/3。"},
{t:T,s:S,c:"確率",q:"10本中2本が当たりのくじを1本引くとき、はずれる確率はいくらか。",ch:["1/5","3/5","4/5","9/10"],a:2,e:"はずれは8本。8/10＝4/5。"},
{t:T,s:S,c:"集合",q:"40人のクラスで、犬が好きな人は25人、猫が好きな人は18人、両方好きな人は10人いる。どちらも好きでない人は何人か。",ch:["5人","7人","9人","12人"],a:1,e:"少なくとも一方が好きな人＝25＋18−10＝33人。40−33＝7人。"},
{t:T,s:S,c:"集合",q:"100人が試験を受け、英語の合格者は60人、数学の合格者は45人、両方の合格者は30人だった。英語だけ合格した人は何人か。",ch:["15人","25人","30人","35人"],a:2,e:"英語のみ＝60−30＝30人。"},
{t:T,s:S,c:"集合",q:"50人のうち、A新聞を読む人は32人、B新聞を読む人は25人、どちらも読まない人は8人いる。両方読む人は何人か。",ch:["10人","12人","15人","17人"],a:2,e:"少なくとも一方を読む人＝50−8＝42人。両方＝32＋25−42＝15人。"},
{t:T,s:S,c:"集合",q:"60人に旅行の希望を聞いたところ、温泉希望が40人、観光希望が35人、どちらも希望しない人が5人だった。両方希望した人は何人か。",ch:["15人","20人","25人","30人"],a:1,e:"少なくとも一方＝60−5＝55人。両方＝40＋35−55＝20人。"},
{t:T,s:S,c:"仕事算",q:"ある仕事をAは12日、Bは6日で終える。2人で一緒にすると何日で終わるか。",ch:["3日","4日","5日","6日"],a:1,e:"1日あたり 1/12＋1/6＝1/4。よって4日。"},
{t:T,s:S,c:"仕事算",q:"水槽を満水にするのに、給水管Aだけなら20分、Bだけなら30分かかる。両方同時に使うと何分かかるか。",ch:["10分","12分","15分","25分"],a:1,e:"1分あたり 1/20＋1/30＝5/60＝1/12。よって12分。"},
{t:T,s:S,c:"仕事算",q:"Aだけなら10日かかる仕事を、Aが4日行い、残りをBが9日で仕上げた。Bだけなら何日かかるか。",ch:["12日","13日","15日","18日"],a:2,e:"Aの4日で全体の4/10＝2/5が終わり、残り3/5をBが9日で行った。Bの1日あたりは(3/5)÷9＝1/15。よって15日。"},
{t:T,s:S,c:"仕事算",q:"同じ能力の3人で行うと4日かかる仕事がある。1人で行うと何日かかるか。",ch:["8日","10日","12日","16日"],a:2,e:"全体の仕事量＝3人×4日＝12人日。1人なら12日。"},
{t:T,s:S,c:"料金・支払い",q:"商品代金の1/3を頭金として支払い、残額の2/5を初回に支払った。残りの支払額は代金全体のどれだけにあたるか。",ch:["1/3","2/5","4/15","7/15"],a:1,e:"頭金後の残額は2/3。初回は(2/3)×(2/5)＝4/15。残り＝2/3−4/15＝10/15−4/15＝6/15＝2/5。"},
{t:T,s:S,c:"料金・支払い",q:"入場料は大人1200円、子ども800円である。大人と子ども合わせて10人で入場したところ、合計10000円だった。大人は何人か。",ch:["4人","5人","6人","7人"],a:1,e:"大人x人とすると 1200x＋800(10−x)＝10000 → 400x＝2000 → x＝5人。"},
{t:T,s:S,c:"料金・支払い",q:"団体割引で2割引となり、1人あたり500円になった。割引前の通常料金はいくらか。",ch:["600円","625円","650円","700円"],a:1,e:"500÷0.8＝625円。"},

{t:T,s:S,c:"長文読解",p:"技術の進歩は私たちの生活を便利にしてきた。しかし、便利さと引き換えに失われたものも少なくない。例えば、地図アプリの普及によって、私たちは道を覚える必要がなくなった。その結果、空間を把握する力が弱まったという指摘がある。道具に頼ること自体が悪いのではない。問題は、道具に任せた能力が自分から失われていくことに無自覚なままでいることだ。技術を使いこなすためには、何を道具に任せ、何を自分の力として残すのかを意識的に選び取る態度が必要になる。",q:"筆者の主張として最も適切なのはどれか。",ch:["何を道具に任せるかを意識的に選び取る態度が必要だ","技術の進歩は生活を悪化させてきた","地図アプリは使うべきではない","道具に頼ることはそれ自体が問題である"],a:0,e:"最終文が主張の中心。「道具に頼ること自体が悪いのではない」と明言しているため、他の選択肢は本文と矛盾する。"},
{t:T,s:S,c:"長文読解",p:"技術の進歩は私たちの生活を便利にしてきた。しかし、便利さと引き換えに失われたものも少なくない。例えば、地図アプリの普及によって、私たちは道を覚える必要がなくなった。その結果、空間を把握する力が弱まったという指摘がある。道具に頼ること自体が悪いのではない。問題は、道具に任せた能力が自分から失われていくことに無自覚なままでいることだ。技術を使いこなすためには、何を道具に任せ、何を自分の力として残すのかを意識的に選び取る態度が必要になる。",q:"「その結果」が指す内容として最も適切なのはどれか。",ch:["地図アプリの普及で道を覚える必要がなくなったこと","技術が進歩したこと","生活が便利になったこと","道具に無自覚に頼っていること"],a:0,e:"直前の文「地図アプリの普及によって、道を覚える必要がなくなった」を受けている。"},
{t:T,s:S,c:"長文読解",p:"技術の進歩は私たちの生活を便利にしてきた。しかし、便利さと引き換えに失われたものも少なくない。例えば、地図アプリの普及によって、私たちは道を覚える必要がなくなった。その結果、空間を把握する力が弱まったという指摘がある。道具に頼ること自体が悪いのではない。問題は、道具に任せた能力が自分から失われていくことに無自覚なままでいることだ。技術を使いこなすためには、何を道具に任せ、何を自分の力として残すのかを意識的に選び取る態度が必要になる。",q:"本文の内容と合致するものはどれか。",ch:["道具に頼ること自体は否定されていない","空間把握力の低下は科学的に証明された","便利さによって失われたものはない","技術の進歩を止めるべきだ"],a:0,e:"「道具に頼ること自体が悪いのではない」と明記されている。空間把握力については「指摘がある」とされているだけで、証明されたとは書かれていない。"},
{t:T,s:S,c:"長文読解",p:"読書の価値は情報を得ることだけにあるのではない。情報だけなら、今やインターネットの方が速く、量も多い。読書に固有の価値は、一冊の本という閉じた世界に長時間とどまることで、他人の思考の筋道を最初から最後までたどる経験にある。断片的な情報をいくら集めても、それは思考の材料にすぎない。材料を組み立てて一つの考えを作り上げる力は、まとまった長さの文章と格闘することでしか養われない。",q:"筆者が考える読書に固有の価値として最も適切なのはどれか。",ch:["他人の思考の筋道を最初から最後までたどる経験","インターネットより多くの情報が得られること","短時間で効率よく知識を得られること","娯楽として楽しめること"],a:0,e:"「読書に固有の価値は……他人の思考の筋道を最初から最後までたどる経験にある」と明記されている。情報量ではむしろインターネットが上だと述べている。"},
{t:T,s:S,c:"長文読解",p:"読書の価値は情報を得ることだけにあるのではない。情報だけなら、今やインターネットの方が速く、量も多い。読書に固有の価値は、一冊の本という閉じた世界に長時間とどまることで、他人の思考の筋道を最初から最後までたどる経験にある。断片的な情報をいくら集めても、それは思考の材料にすぎない。材料を組み立てて一つの考えを作り上げる力は、まとまった長さの文章と格闘することでしか養われない。",q:"本文の内容と合致するものはどれか。",ch:["情報収集の速さと量ではインターネットが読書に勝る","断片的な情報を集めれば考える力が身につく","読書の価値は情報を得ることにある","インターネットには価値がない"],a:0,e:"「情報だけなら、今やインターネットの方が速く、量も多い」と明記されている。断片的な情報は「思考の材料にすぎない」とされている。"}

/* 安定ID（端末間同期でも問題を同定できるようハッシュで付与） */
function qhash(s){let h=0;for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0}return "q"+(h>>>0).toString(36)}
BANK.forEach(q=>q.id=qhash(q.t+"|"+q.c+"|"+(q.p||"")+"|"+(q.tb||"")+"|"+q.q+"|"+q.ch.join("§")));
/* 組問題：同じ本文・図表を共有する問題を自動でグループ化 */
(function(){const gm={};BANK.forEach(q=>{const k=q.p||q.tb;if(k)(gm[k]=gm[k]||[]).push(q)});let i=0;Object.values(gm).forEach(l=>{if(l.length>1){i++;l.forEach(q=>q.grp="g"+i)}})})();
/* サンプリング後、同一グループを連続配置（テストセンターの組問題形式を再現） */
function groupAdj(arr){const out=[],used=new Set();arr.forEach(q=>{if(used.has(q.id))return;out.push(q);used.add(q.id);if(q.grp)arr.forEach(o=>{if(!used.has(o.id)&&o.grp===q.grp){out.push(o);used.add(o.id)}})});return out}

/* ================= 基本ユーティリティ ================= */
const $=s=>document.querySelector(s);
function rnd(n){return Math.floor(Math.random()*n)}
function pk(a){return a[rnd(a.length)]}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n){return shuffle(arr.slice()).slice(0,n)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dateStr(off){const d=new Date();d.setDate(d.getDate()+off);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function fmtMin(sec){const m=Math.floor(sec/60);return m>=60?Math.floor(m/60)+"時間"+(m%60)+"分":m+"分"}
function fmtMS(sec){return Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0")}

/* ---- 自動生成問題（四則逆算・暗算）---- */
function mkChoices(ans,mk){const set=new Set([ans]);let g=0;while(set.size<4&&g++<200){const d=mk();if(d!==null&&d!==ans&&d>0)set.add(d)}const ch=shuffle([...set]);return{ch:ch.map(String),a:ch.indexOf(ans)}}
function genShisoku(){
 const p=rnd(6);let q,ans;
 if(p===0){const a=rnd(11)+2,x=rnd(28)+3;q="□ × "+a+" ＝ "+(a*x);ans=x}
 else if(p===1){const a=rnd(11)+2,b=rnd(18)+2;q="□ ÷ "+a+" ＝ "+b;ans=a*b}
 else if(p===2){const a=rnd(180)+20,b=rnd(180)+20;q=a+" ＋ □ ＝ "+(a+b);ans=b}
 else if(p===3){const a=rnd(90)+10,b=rnd(90)+10;q="□ − "+a+" ＝ "+b;ans=a+b}
 else if(p===4){const a=rnd(8)+2,b=rnd(8)+2,d=rnd(40)+5;q=a+" × "+b+" ＋ □ ＝ "+(a*b+d);ans=d}
 else{const pr=pk([10,20,25,40,50,75]),a=(rnd(15)+2)*20;q=a+" × "+pr+"% ＝ □";ans=a*pr/100}
 const c=mkChoices(ans,()=>ans+pk([-10,-5,-2,-1,1,2,5,10,ans>1?ans:2]));
 return{t:"tama",s:"ks",c:"四則逆算",q,ch:c.ch,a:c.a,e:"答え："+ans+"　□を求める逆算。移項して計算する。",gen:true}
}
function genAnzan(){
 const p=rnd(5);let q,ans;
 if(p===0){const a=rnd(80)+12,b=rnd(80)+12;q=a+" × "+b;ans=a*b}
 else if(p===1){const b=rnd(14)+6,x=rnd(40)+8;q=(b*x)+" ÷ "+b;ans=x}
 else if(p===2){const pr=pk([15,20,25,30,35,40,45,60,75]),a=(rnd(20)+4)*20;q=a+" の "+pr+"%";ans=a*pr/100}
 else if(p===3){const a=rnd(700)+150,b=rnd(700)+150;q=a+" ＋ "+b;ans=a+b}
 else{const a=rnd(500)+300,b=rnd(280)+10;q=a+" − "+b;ans=a-b}
 const c=mkChoices(ans,()=>ans+pk([-100,-10,-2,-1,1,2,10,100]));
 return{t:"gc",s:"cab",c:"暗算",q,ch:c.ch,a:c.a,e:"答え："+ans,gen:true}
}
const GEN_CATS=[{t:"tama",s:"ks",c:"四則逆算",gen:genShisoku},{t:"gc",s:"cab",c:"暗算",gen:genAnzan}];

 save();

function weakCats(min){return Object.entries(S.res).filter(([k,r])=>r.n>=min).map(([k,r])=>({k,acc:r.c/r.n,n:r.n})).sort((a,b)=>a.acc-b.acc)}

let SES=null,tickH=null;
function startSession(o){SES={qs:o.qs,i:0,mode:o.mode,name:o.name,limit:(o.min||0)*60,left:(o.min||0)*60,elapsed:0,ans:[],correct:0,answered:false};clearInterval(tickH);tickH=setInterval(tick,1000);route("session")}
function tick(){
 if(!SES||document.visibilityState!=="visible")return;
 SES.elapsed++;S.days[today()]=(S.days[today()]||0)+1;if(SES.elapsed%15===0)save();
 if(SES.limit){SES.left--;const el=$("#timer");if(el){el.textContent=fmtMS(Math.max(0,SES.left));el.classList.toggle("warn",SES.left<60)}if(SES.left<=0){finishSession();return}}
 else{const el=$("#timer");if(el)el.textContent=fmtMS(SES.elapsed)}
}
function endSession(){clearInterval(tickH);tickH=null;SES=null;save()}
function answer(i){
 if(!SES)return;const q=SES.qs[SES.i];
 if(SES.mode==="practice"){
  if(SES.answered)return;SES.answered=true;
  const ok=i===q.a;if(ok)SES.correct++;record(q,ok);
  renderSession(i);
 }else{
  SES.ans[SES.i]=i;const ok=i===q.a;if(ok)SES.correct++;record(q,ok);
  nextQ();
 }
}
function nextQ(){
 if(!SES)return;
 if(SES.i>=SES.qs.length-1){finishSession();return}
 SES.i++;SES.answered=false;renderSession(null);
}
function finishSession(){
 if(!SES)return;const s=SES;clearInterval(tickH);tickH=null;save();
 if(s.mode==="mock"){
  const cats={};s.qs.forEach((q,i)=>{const k=q.t+"|"+q.c;const c=cats[k]||(cats[k]={n:0,c:0});c.n++;if(s.ans[i]===q.a)c.c++});
  S.mocks.push({d:today(),name:s.name,score:s.correct,total:s.qs.length,time:s.elapsed});
  if(S.mocks.length>30)S.mocks=S.mocks.slice(-30);
  save();renderMockResult(s,cats);
 }else{renderPracticeResult(s)}
 SES=null;
}

function startPractice(){
 const{t,s,c,n}=PSEL;let qs=[];
 if(c==="__weak"){qs=sample(S.wrong.map(id=>BANK.find(q=>q.id===id)).filter(Boolean),n)}
 else{
  const pool=BANK.filter(q=>q.t===t&&q.s===s&&(c==="all"||q.c===c));
  qs=groupAdj(sample(pool,Math.min(n,pool.length)));
  const g=GEN_CATS.find(x=>x.t===t&&x.s===s&&(c==="all"?pool.length<n:c===x.c));
  if(g)while(qs.length<n)qs.push(g.gen());
 }
 if(!qs.length){alert("この条件の問題がありません");return}
 startSession({qs,mode:"practice",name:"練習"});
}

 new Set(Object.keys(a.days||{}).concat(Object.keys(b.days||{}))).forEach(d=>{m.days[d]=Math.max((a.days||{})[d]||0,(b.days||{})[d]||0)});

 m.wrong=Array.from(new Set((a.wrong||[]).concat(b.wrong||[])));
 return m;
